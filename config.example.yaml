# Sample runtime configuration. Copy to config.yaml and adjust as needed.
# Loaded at startup when the project is built with yaml-cpp (ENABLE_YAML_CONFIG).
# Any missing key falls back to the built-in defaults, so a partial file is fine.

detection:
  score_threshold: 0.4
  nms_threshold: 0.5

model:
  model_file: "yoloe-11l-seg.onnx"
  class_names_file: "yoloe_classes.txt"
  model_width: 640
  model_height: 640

backend:
  framework: "ONNXRuntime"   # OpenCV | OpenVINO | ONNXRuntime; ONNXRuntime + macOS CoreML can use the Apple Neural Engine
  use_cuda: false

input:
  source: "VIDEO"            # WEBCAM | VIDEO
  webcam_index: 0
  video_input_file: "test.mov"
  video_output_file: "output.mp4"

display:
  show_frames: false
