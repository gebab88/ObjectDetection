detection:
  score_threshold: 0.4
  nms_threshold: 0.5

model:
  model_file: "yolo26x.onnx"
  class_names_file: "coco.txt"
  model_width: 640
  model_height: 640

backend:
  framework: "ONNXRuntime"   # OpenCV | OpenVINO | ONNXRuntime; ONNXRuntime + macOS CoreML can use Apple Neural Engine
  use_cuda: false

input:
  source: "VIDEO"          # WEBCAM | VIDEO 
  webcam_index: 0
  video_input_file: "test.mov"
  video_output_file: "output.mp4"

display:
  show_frames: false
